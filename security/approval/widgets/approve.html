<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    --surface:#fbfbfa; --card:#ffffff; --ink:#0b0b0b; --ink-2:#55534e; --muted:#8a8882;
    --border:rgba(11,11,11,0.12); --line:#ece9e3;
    --ok:#0a8f0a; --ok-bg:#eef8ee; --ok-bd:#bfe6bf;
    --no:#c8362f; --no-bg:#fbeeed; --no-bd:#f0c7c4;
    --warn:#8a6d00; --warn-bg:#fbf5e3; color-scheme:light;
  }
  @media (prefers-color-scheme: dark) {
    :root { --surface:#191918; --card:#232322; --ink:#f4f3f1; --ink-2:#c3c2b7; --muted:#8a8a86;
      --border:rgba(255,255,255,0.14); --line:#33322f;
      --ok:#4cc24c; --ok-bg:#14251a; --ok-bd:#245f2a;
      --no:#e8726b; --no-bg:#2a1716; --no-bd:#5c2b28;
      --warn:#e5c25a; --warn-bg:#2a2410; color-scheme:dark; }
  }
  html,body{margin:0}
  body{font:13.5px/1.5 system-ui,-apple-system,"Segoe UI",sans-serif;background:var(--surface);color:var(--ink);padding:12px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
  .body{padding:14px 16px}
  .head{display:flex;align-items:center;gap:8px;font-weight:650;font-size:14px}
  .head .dot{font-size:15px}
  .sub{color:var(--muted);font-size:12px;margin:2px 0 10px}
  .action{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;color:var(--ink-2);
    background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:9px 11px;word-break:break-word}
  .btns{display:flex;gap:8px;margin-top:12px}
  button{flex:1;font:inherit;font-weight:600;padding:9px 12px;border-radius:10px;border:1px solid var(--border);cursor:pointer;transition:filter .1s}
  button:hover{filter:brightness(0.97)}
  button:active{filter:brightness(0.93)}
  button:disabled{opacity:.5;cursor:default}
  .approve{background:var(--ok-bg);color:var(--ok);border-color:var(--ok-bd)}
  .deny{background:var(--no-bg);color:var(--no);border-color:var(--no-bd)}
  .inline-err{margin-top:10px;font-size:12px;color:var(--no)}
  /* decided panel */
  .result{padding:14px 16px;border-top:1px solid var(--line)}
  .result .status{display:flex;align-items:center;gap:8px;font-weight:650;font-size:14px}
  .result.ok .status{color:var(--ok)} .result.no .status{color:var(--no)} .result.warn .status{color:var(--warn)}
  .result .instruct{margin-top:8px;color:var(--ink-2);font-size:12.5px}
  .result .instruct b{color:var(--ink)}
  .reply{display:inline-block;margin-top:8px;font-family:ui-monospace,monospace;font-size:12.5px;
    background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:4px 9px}
  details{border-top:1px solid var(--line)}
  summary{cursor:pointer;color:var(--muted);font-size:11px;padding:8px 16px;list-style:none}
  summary::-webkit-details-marker{display:none}
  #diag{font-family:ui-monospace,monospace;font-size:11px;white-space:pre-wrap;color:var(--muted);
    padding:0 16px 10px;max-height:180px;overflow-y:auto}
  [hidden]{display:none!important}
</style>
</head>
<body>
<script>
  window.diag = (m) => { const d=document.getElementById("diag"); if(d) d.textContent += m+"\n"; };
  ["error","unhandledrejection"].forEach((k)=>addEventListener(k,(e)=>diag("PAGE ERROR: "+(e.reason?.message??e.reason??e.message??k))));
</script>
<div class="card">
  <div class="body" id="pending">
    <div class="head"><span class="dot">⏸</span> Approval requested</div>
    <div class="sub">A tool needs your OK before it runs.</div>
    <div class="action" id="action">…</div>
    <div class="btns">
      <button class="approve" id="approve" type="button">✅ Approve</button>
      <button class="deny" id="deny" type="button">❌ Deny</button>
    </div>
    <div class="inline-err" id="inlineErr" hidden></div>
  </div>
  <div class="result" id="result" hidden>
    <div class="status" id="rstatus"></div>
    <div class="instruct" id="rinstruct"></div>
  </div>
  <details>
    <summary>diagnostics</summary>
    <div id="diag"></div>
  </details>
</div>
<script type="module">
/*__EXT_APPS_BUNDLE__*/
</script>
<script type="module">
const { App } = globalThis.ExtApps;
const $ = (id) => document.getElementById(id);
let ctx = null;

function parsePayload(text) {
  try { return JSON.parse(text); } catch {}
  const m = text && text.match(/\{[\s\S]*\}/);
  if (m) { try { return JSON.parse(m[0]); } catch {} }
  return null;
}

function showResult(kind, statusHtml, instructHtml) {
  $("pending").hidden = true;
  const r = $("result");
  r.hidden = false;
  r.className = "result " + kind;
  $("rstatus").innerHTML = statusHtml;
  $("rinstruct").innerHTML = instructHtml;
}

async function decide(decision) {
  $("approve").disabled = true;
  $("deny").disabled = true;
  $("inlineErr").hidden = true;
  if (!ctx?.token) { showInlineErr("No approval token — reload and try again."); return; }
  diag(`decision=${decision}; token=${ctx.token.slice(0,6)}…`);
  let flipped = false;

  // PRIMARY: direct POST to the sidecar — session-independent, needs csp.connectDomains.
  if (ctx.public_base) {
    try {
      await fetch(`${ctx.public_base}/approve/${ctx.token}`, {
        method: "POST", mode: "no-cors",
        headers: { "content-type": "application/x-www-form-urlencoded" },
        body: "decision=" + decision,
      });
      flipped = true;
      diag("B direct-fetch: SENT (CSP allowed it)");
    } catch (e) { diag("B direct-fetch: BLOCKED — " + (e?.message ?? e)); }
  }
  // FALLBACK: callServerTool (rides the MCP session; may already be gone post-turn).
  if (!flipped) {
    try {
      const r = await app.callServerTool({ name: "approve_gate", arguments: { token: ctx.token, decision } });
      flipped = /HTTP 200/.test(JSON.stringify(r));
      diag("A callServerTool: " + JSON.stringify(r).slice(0,160));
    } catch (e) { diag("A callServerTool FAILED: " + (e?.message ?? e)); }
  }

  if (!flipped) { showInlineErr("Couldn't reach the approval service. Try again."); return; }

  // No composer text is ever injected (it trips claude.ai's prompt-injection warning),
  // so the widget tells the USER to nudge the assistant onward.
  if (decision === "approve") {
    showResult("ok", "✅&nbsp;<b>Approved</b>",
      'The action is cleared to run. <b>Reply to the assistant so it continues</b> — e.g. ' +
      '<span class="reply">go ahead</span>');
  } else {
    showResult("no", "❌&nbsp;<b>Denied</b>",
      'The action is blocked. <b>Tell the assistant it was denied</b> — e.g. ' +
      '<span class="reply">denied — don\'t send it</span>');
  }
}

function showInlineErr(msg) {
  $("approve").disabled = false;
  $("deny").disabled = false;
  const e = $("inlineErr");
  e.hidden = false;
  e.textContent = "⚠ " + msg;
}

const app = new App({ name: "approval-widget", version: "0.2.0" }, {}, { autoResize: true });
app.ontoolresult = (result) => {
  diag("toolresult keys: " + Object.keys(result || {}).join(","));
  ctx = parsePayload(result?.content?.[0]?.text ?? "");
  if (ctx?.token) {
    $("action").textContent = ctx.action ?? "(no action)";
    diag("token parsed ✓; public_base=" + (ctx.public_base ?? "—"));
  } else {
    $("action").textContent = ctx?.action ?? "(could not read the request)";
    $("approve").disabled = true; $("deny").disabled = true;
    diag("NO token in payload; keys=" + Object.keys(ctx || {}).join(","));
  }
};
$("approve").addEventListener("click", () => decide("approve"));
$("deny").addEventListener("click", () => decide("deny"));
await app.connect();
diag("connected");
</script>
</body>
</html>
