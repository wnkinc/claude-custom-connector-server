# INGRESS substrate (container idiom): the Cloudflare tunnel that fronts the mcp-tools,
# re-homed from ~/.cloudflared/config.yml INTO the repo so nothing public runs that isn't
# committed. This file is the legible half (routing); the credentials JSON is the secret
# half, injected at /etc/cloudflared/creds.json (gitignored security/ingress/secrets/).
#
# cloudflared dials OUT to Cloudflare's edge (no inbound ports) and forwards to the tool
# over the compose `internal` network by service name -- so the tool needs no published
# host port when fronted this way.
#
# Cutover (the host connector must stop first -- two connectors with different configs
# would split-route the same hostname):
#   systemctl --user stop cloudflared-openclaw
#   cp ~/.cloudflared/fc5d8823-096f-4079-bb32-fcc372d725a1.json security/ingress/secrets/creds.json
#   docker compose -f docker-compose.yml -f docker-compose.tunnel.yml up -d

tunnel: fc5d8823-096f-4079-bb32-fcc372d725a1
credentials-file: /etc/cloudflared/creds.json

ingress:
  # x-mcp: the MCP server does its OWN Google OAuth (no Cloudflare Access policy here).
  - hostname: xmcp.secure-agentic-engineering.com
    service: http://xmcp:8061

  # When data/quant join the compose stack, add their routes here:
  #   - hostname: data.secure-agentic-engineering.com
  #     service: http://data:8062
  #   - hostname: quant.secure-agentic-engineering.com
  #     service: http://quant:8064

  # Everything else is refused.
  - service: http_status:404
