# mcp-tools egress proxy (THREAT-MODEL L2) — installed to /etc/squid/squid.conf.
#
# Loopback-only, PER-TOOL listeners, domain allowlist, DEFAULT-DENY (fail closed),
# CONNECT-level only (no TLS interception), no caching. squid's access.log is the
# central egress audit trail. Tools are forced through this by HTTPS_PROXY + an
# IPAddress wall in their systemd unit (the proxy is their only route off-box).
#
# Per-tool scoping: each tool gets its own loopback port (name=...); `myportname`
# maps that listener to that tool's allowlist file, so a compromised tool can only
# reach ITS domains, not another tool's. Add a tool = one http_port + one acl pair.

# --- per-tool listeners (loopback only) ---
http_port 127.0.0.1:8073 name=x-mcp

# --- per-tool allowlists (dstdomain files) ---
acl port_x_mcp myportname x-mcp
acl dom_x_mcp  dstdomain "/etc/squid/allowlist/x-mcp.txt"

# --- method / port safety ---
acl CONNECT  method CONNECT
acl SSL_ports port 443

# --- policy ---
# Only HTTPS CONNECT is allowed, and only to a tool's own allowlisted domains.
http_access deny CONNECT !SSL_ports
http_access allow port_x_mcp CONNECT dom_x_mcp
# Fail closed: anything not explicitly allowed above is denied (and logged).
http_access deny all

# --- no caching, minimal footprint, don't leak proxy details ---
cache deny all
httpd_suppress_version_string on
via off
forwarded_for delete

# --- central egress audit log ---
access_log /var/log/squid/access.log squid
shutdown_lifetime 5 seconds
